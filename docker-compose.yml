version: "3.8"
services:
  fido:
    build: .
    container_name: fido
    ports:
      - "8080:8080"
    volumes:
      - /mnt/datos/fido:/app/data
    environment:
      - TZ=Europe/Madrid
      - FIDO_DB_PATH=/app/data/fido.db
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC}
      - NTFY_CUENTA_DEFAULT=${NTFY_CUENTA_DEFAULT:-1}
    restart: always
